name: Reusable — Merge Audit + Knowledge Snapshot (Capa 2)
# Workflow reutilizable: audita coherencia docs↔código en cada merge a main con IA.
# El script que ejecuta (scripts/ci/merge-audit.py) vive en el repo LLAMADOR —
# el reusable solo provee el entorno (checkout, Python, secrets, artifact upload).
#
# Uso mínimo en el repo del proyecto:
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     merge-audit:
#       uses: trycore-co/.github/.github/workflows/reusable-docs-merge-audit.yml@main
#       secrets: inherit
#
# CONTRATO del script scripts/ci/merge-audit.py (el repo llamador lo provee):
#
#   ENV VARS inyectadas por este reusable:
#     ANTHROPIC_API_KEY   — heredada del org secret
#     GITHUB_TOKEN        — token de Actions
#     GITHUB_REPOSITORY   — "owner/repo"
#     GITHUB_SHA          — SHA del commit
#     DRY_RUN             — "true"/"false" según input dry_run
#     MERGE_BASE_REF      — rama base según input base_ref (ej. "develop")
#
#   ARCHIVO que el script debe generar:
#     scripts/ci/knowledge-snapshot.json
#     Esquema: {"sha": "...", "total_files": N, "docs": ["docs/file.md", ...]}
#
#   EXIT CODE: siempre 0 (no bloquea el pipeline)
#
#   PLANTILLA: docs/plantillas/merge-audit.python-fastapi.py en trycore-co/.github

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner a usar (self-hosted o ubuntu-latest)'
        type: string
        default: 'self-hosted'
      dry_run:
        description: 'No crear issues aunque haya drift crítico'
        type: boolean
        default: false
      base_ref:
        description: 'Rama base para el diff (ej: develop)'
        type: string
        default: 'develop'
      python_version:
        description: 'Versión de Python para el script de auditoría'
        type: string
        default: '3.11'
      artifact_retention_days:
        description: 'Días de retención del knowledge snapshot'
        type: number
        default: 90

jobs:
  merge-audit:
    name: Merge Audit
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Run merge audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          DRY_RUN: ${{ inputs.dry_run }}
          MERGE_BASE_REF: ${{ inputs.base_ref }}
        run: python scripts/ci/merge-audit.py

      - name: Upload knowledge snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-snapshot-${{ github.sha }}
          path: scripts/ci/knowledge-snapshot.json
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn
