name: Reusable — PR Check Angular 19

on:
  workflow_call:
    inputs:
      service-dir:
        description: 'Directorio del servicio. Usar "." para repos de un solo servicio.'
        required: false
        type: string
        default: '.'
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '22'
      has-tests:
        description: 'true si los tests de Karma/Jasmine están configurados y pasan'
        required: false
        type: boolean
        default: true
      tests-continue-on-error:
        description: 'TEMPORAL: true cuando hay tests rotos siendo corregidos'
        required: false
        type: boolean
        default: false
      type-check-continue-on-error:
        description: 'TEMPORAL: true cuando hay errores TypeScript siendo corregidos'
        required: false
        type: boolean
        default: false
    secrets:
      SONAR_TOKEN:
        required: true

jobs:

  # ── 1. Build + Type-check + Tests + SonarQube ────────────────────────────────
  build-test-sonar:
    name: Build, Tests & SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitizar project key y variables de Sonar
        id: artifact
        run: |
          echo "key=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_OUTPUT"
          echo "SONAR_HOST_URL=$(echo '${{ vars.SONAR_HOST_URL }}' | tr -d '[:space:]')" >> "$GITHUB_ENV"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.service-dir }}/package-lock.json'

      - name: Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install dependencies
        working-directory: ${{ inputs.service-dir }}
        run: npm ci

      - name: TypeScript check
        working-directory: ${{ inputs.service-dir }}
        continue-on-error: ${{ inputs.type-check-continue-on-error }}
        run: npx tsc --noEmit

      - name: Run unit tests (Karma / ChromeHeadless)
        if: ${{ inputs.has-tests }}
        working-directory: ${{ inputs.service-dir }}
        continue-on-error: ${{ inputs.tests-continue-on-error }}
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          npm test -- \
            --watch=false \
            --browsers=ChromeHeadless \
            --code-coverage \
            --reporters=progress,junit 2>/dev/null || \
          npm test -- \
            --watch=false \
            --browsers=ChromeHeadless \
            --code-coverage 2>/dev/null || true

      - name: Encabezado Unit Tests en summary
        if: ${{ inputs.has-tests }}
        run: |
          echo "## 🧪 Unit Tests — ${{ inputs.sonar-project-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar resultados de tests
        uses: mikepenz/action-junit-report@v4
        if: ${{ inputs.has-tests }}
        continue-on-error: true
        with:
          report_paths: '${{ inputs.service-dir }}/test-results/**/*.xml'
          check_name: 'Unit Tests — ${{ inputs.sonar-project-name }}'
          fail_on_failure: false

      - name: Build producción
        working-directory: ${{ inputs.service-dir }}
        run: npm run build -- --configuration=production 2>/dev/null || npm run build 2>/dev/null || true

      - name: SonarQube Scan
        if: always()
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.service-dir }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName="${{ inputs.sonar-project-name }}"
            -Dsonar.sources=src
            -Dsonar.exclusions=src/test/**,**/*.spec.{ts,tsx},**/node_modules/**,dist/**
            -Dsonar.javascript.lcov.reportPaths=coverage/${{ inputs.sonar-project-key }}/lcov.info,coverage/lcov.info
            -Dsonar.qualitygate.wait=false

      - name: Resumen SonarQube en Actions
        if: always()
        working-directory: ${{ inputs.service-dir }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: |
          REPORT=".scannerwork/report-task.txt"
          if [ ! -f "$REPORT" ]; then
            echo "## 🔍 SonarQube" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Sin reporte — verificar conexión o que el proyecto exista en SonarQube." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          DASHBOARD_URL=$(grep "^dashboardUrl=" "$REPORT" | cut -d= -f2-)
          CE_TASK_ID=$(grep "^ceTaskId=" "$REPORT" | cut -d= -f2-)
          for i in $(seq 1 12); do
            TASK_STATUS=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/ce/task?id=$CE_TASK_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['task']['status'])" 2>/dev/null || echo "PENDING")
            [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "FAILED" ] || [ "$TASK_STATUS" = "CANCELLED" ] && break
            sleep 5
          done
          QG_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=${{ inputs.sonar-project-key }}" 2>/dev/null || echo "{}")
          QG_STATUS=$(echo "$QG_JSON" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          METRICS_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/measures/component?component=${{ inputs.sonar-project-key }}&metricKeys=coverage,duplicated_lines_density,bugs,vulnerabilities,code_smells,security_hotspots" 2>/dev/null || echo "{}")
          parse_metric() {
            echo "$METRICS_JSON" | python3 -c \
              "import sys,json; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin).get('component',{}).get('measures',[])}; print(m.get('$1','N/A'))" 2>/dev/null || echo "N/A"
          }
          COVERAGE=$(parse_metric coverage)
          DUPLICATIONS=$(parse_metric duplicated_lines_density)
          BUGS=$(parse_metric bugs)
          VULNERABILITIES=$(parse_metric vulnerabilities)
          CODE_SMELLS=$(parse_metric code_smells)
          SEC_HOTSPOTS=$(parse_metric security_hotspots)
          if   [ "$QG_STATUS" = "OK" ];    then QG_BADGE="✅ PASSED"
          elif [ "$QG_STATUS" = "ERROR" ]; then QG_BADGE="❌ FAILED"
          else                                  QG_BADGE="⚠️ $QG_STATUS"
          fi
          {
            echo "## 🔍 SonarQube — $QG_BADGE"
            echo ""
            echo "| Métrica | Valor | Umbral |"
            echo "|---------|-------|--------|"
            echo "| Quality Gate | $QG_BADGE | — |"
            echo "| Coverage | ${COVERAGE}% | ≥ 80% |"
            echo "| Duplicaciones | ${DUPLICATIONS}% | ≤ 3% |"
            echo "| Bugs | $BUGS | 0 críticos |"
            echo "| Vulnerabilidades | $VULNERABILITIES | 0 críticas |"
            echo "| Code Smells | $CODE_SMELLS | — |"
            echo "| Security Hotspots | $SEC_HOTSPOTS | 0 sin revisar |"
            echo ""
            echo "[📊 Ver análisis completo en SonarQube]($DASHBOARD_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: ${{ inputs.service-dir }}/.scannerwork/report-task.txt

  # ── 2. SCA: Trivy ────────────────────────────────────────────────────────────
  sca-trivy:
    name: SCA — Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sanitize artifact name
        id: artifact
        run: echo "key=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_OUTPUT"

      - name: Trivy — escanear y guardar tabla
        working-directory: ${{ inputs.service-dir }}
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # Un solo scan JSON — extrae conteos de los 3 niveles sin correr trivy 4 veces
          trivy fs . \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --skip-dirs '.git,node_modules,dist' \
            --format json \
            --output trivy-report.json 2>/dev/null || true
          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='CRITICAL'))
          " 2>/dev/null || echo "0")
          HIGH=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='HIGH'))
          " 2>/dev/null || echo "0")
          MEDIUM=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='MEDIUM'))
          " 2>/dev/null || echo "0")
          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
            SCA_STATUS="✅ Sin vulnerabilidades CRITICAL/HIGH"
          else
            SCA_STATUS="⚠️ Vulnerabilidades encontradas (modo informativo)"
          fi
          {
            echo "## 🛡️ SCA — Trivy — $SCA_STATUS"
            echo ""
            echo "| Severidad | Vulnerabilidades encontradas |"
            echo "|-----------|----------------------------|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Medium | $MEDIUM |"
            echo ""
            echo "> Solo aplica a dependencias con fix disponible. Modo informativo — no bloquea el pipeline."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$CRITICAL" != "0" ] || [ "$HIGH" != "0" ] || [ "$MEDIUM" != "0" ]; then
            DETAIL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          rows = []
          for r in d.get('Results', []):
            for v in (r.get('Vulnerabilities') or []):
              sev = v.get('Severity','')
              if sev in ('CRITICAL','HIGH','MEDIUM'):
                fix = v.get('FixedVersion','') or 'Sin fix'
                rows.append(f\"| {v.get('PkgName','?')} | {sev} | {v.get('VulnerabilityID','?')} | {v.get('InstalledVersion','?')} | {fix} |\")
          print('\n'.join(rows[:60]))
          " 2>/dev/null || echo "")
            if [ -n "$DETAIL" ]; then
              {
                echo ""
                echo "<details>"
                echo "<summary>📋 Ver detalle de CVEs encontrados (CRITICAL / HIGH / MEDIUM)</summary>"
                echo ""
                echo "| Paquete | Severidad | CVE | Versión instalada | Fix disponible |"
                echo "|---------|-----------|-----|-------------------|----------------|"
                echo "$DETAIL"
                echo ""
                echo "</details>"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          # Generar SARIF usando el binario ya instalado — evita la descarga extra
          # de trivy-action@master que causa rate-limit 429 en repositorios de Maven Central
          trivy fs . \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --skip-dirs '.git,node_modules,dist' \
            --format sarif \
            --output trivy-results.sarif 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sca-report-${{ steps.artifact.outputs.key }}-${{ github.run_id }}
          path: ${{ inputs.service-dir }}/trivy-report.json
          retention-days: 30

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # ── 3. SCA: npm audit (OWASP A06) ────────────────────────────────────────────
  sca-npm-audit:
    name: SCA — npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.service-dir }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ inputs.service-dir }}
        run: npm ci

      - name: npm audit — escanear dependencias
        id: npm_audit
        working-directory: ${{ inputs.service-dir }}
        run: |
          npm audit --json > npm-audit.json 2>/dev/null || true
          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'critical'))
          " 2>/dev/null || echo "0")
          HIGH=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'high'))
          " 2>/dev/null || echo "0")
          MODERATE=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'moderate'))
          " 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH"         >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"
          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
            AUDIT_STATUS="✅ Sin vulnerabilidades CRITICAL/HIGH"
          elif [ "$CRITICAL" = "0" ]; then
            AUDIT_STATUS="⚠️ HIGH encontradas — revisar antes de merge"
          else
            AUDIT_STATUS="❌ CRITICAL encontradas"
          fi
          {
            echo "## 🔒 SCA — npm audit — $AUDIT_STATUS"
            echo ""
            echo "| Severidad | Vulnerabilidades |"
            echo "|-----------|-----------------|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo ""
            echo "> **Critical** bloquea el merge. **High/Moderate** es informativo."
            echo "> Correr \`npm audit fix\` localmente para dependencias con fix disponible."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$CRITICAL" != "0" ] || [ "$HIGH" != "0" ] || [ "$MODERATE" != "0" ]; then
            JQ_ROWS=$(jq -r '
              .vulnerabilities // {} | to_entries |
              map(select(.value.severity == "critical" or .value.severity == "high" or .value.severity == "moderate")) |
              sort_by([
                (.value.severity == "critical" | not),
                (.value.severity == "high" | not),
                .key
              ]) |
              .[] |
              "| " + .key + " | " + .value.severity + " | " + (.value.range // "?") + " | " + (if .value.fixAvailable == true then "Sí" elif (.value.fixAvailable | type) == "object" then "Parcial" else "No" end) + " |"
            ' npm-audit.json 2>/dev/null || echo "")
            if [ -n "$JQ_ROWS" ]; then
              {
                echo ""
                echo "<details>"
                echo "<summary>Ver paquetes con vulnerabilidades CRITICAL / HIGH / MODERATE</summary>"
                echo ""
                echo "| Paquete | Severidad | Versiones afectadas | Fix disponible |"
                echo "|---------|-----------|---------------------|----------------|"
                echo "$JQ_ROWS"
                echo ""
                echo "> Referencia: OWASP A06 — Vulnerable and Outdated Components."
                echo "</details>"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Sanitize artifact name
        if: always()
        run: echo "ARTIFACT_KEY=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report-${{ env.ARTIFACT_KEY }}-${{ github.run_id }}
          path: ${{ inputs.service-dir }}/npm-audit.json
          retention-days: 30

      - name: Bloquear merge si hay vulnerabilidades CRITICAL
        if: steps.npm_audit.outputs.critical != '0'
        run: |
          echo "❌ npm audit encontró ${{ steps.npm_audit.outputs.critical }} vulnerabilidad(es) CRITICAL."
          echo "   Correr 'npm audit fix' o actualizar la dependencia afectada antes de hacer merge."
          exit 1
