name: Reusable — PR Check Node.js / React Service

on:
  workflow_call:
    inputs:
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '20'
      has-tests:
        description: 'true si el servicio tiene suite de unit tests (Vitest)'
        required: false
        type: boolean
        default: true
      tests-continue-on-error:
        description: 'TEMPORAL: true cuando hay tests rotos siendo corregidos'
        required: false
        type: boolean
        default: false
      coverage-exclusions:
        description: 'Patrones Sonar para excluir de cobertura (lcov)'
        required: false
        type: string
        default: 'src/main.tsx,src/App.tsx'
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  # ── 1. Build + Tests + SonarQube ────────────────────────────────────────────
  build-test-sonar:
    name: Build, Tests & SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        if: ${{ inputs.has-tests }}
        continue-on-error: ${{ inputs.tests-continue-on-error }}
        run: npm run test -- --reporter=verbose --reporter=junit --outputFile=test-results.xml --coverage --pool=vmForks

      - name: Encabezado Unit Tests en summary
        if: ${{ inputs.has-tests }}
        run: |
          echo "## 🧪 Unit Tests — ${{ inputs.sonar-project-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar resultados de tests
        uses: mikepenz/action-junit-report@v4
        if: ${{ inputs.has-tests }}
        with:
          report_paths: 'test-results.xml'
          check_name: 'Unit Tests — ${{ inputs.sonar-project-name }}'
          fail_on_failure: false
          annotate_only: ${{ inputs.tests-continue-on-error }}

      - name: SonarQube Scan
        if: always()
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.projectName="${{ inputs.sonar-project-name }}"
            -Dsonar.sources=src
            -Dsonar.exclusions=src/test/**,**/*.test.{ts,tsx}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=false
            -Dsonar.coverage.exclusions=${{ inputs.coverage-exclusions }}

      - name: Resumen SonarQube en Actions
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          REPORT=".scannerwork/report-task.txt"
          if [ ! -f "$REPORT" ]; then
            echo "## 🔍 SonarQube" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ El análisis no generó reporte (posible fallo de conexión)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          DASHBOARD_URL=$(grep "^dashboardUrl=" "$REPORT" | cut -d= -f2-)
          CE_TASK_ID=$(grep "^ceTaskId=" "$REPORT" | cut -d= -f2-)

          for i in $(seq 1 12); do
            TASK_STATUS=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/ce/task?id=$CE_TASK_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['task']['status'])" 2>/dev/null || echo "PENDING")
            if [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "FAILED" ] || [ "$TASK_STATUS" = "CANCELLED" ]; then
              break
            fi
            sleep 5
          done

          QG_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=${{ inputs.sonar-project-key }}" 2>/dev/null || echo "{}")
          QG_STATUS=$(echo "$QG_JSON" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")

          METRICS_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/measures/component?component=${{ inputs.sonar-project-key }}&metricKeys=coverage,duplicated_lines_density,bugs,vulnerabilities,code_smells,security_hotspots" 2>/dev/null || echo "{}")

          parse_metric() {
            echo "$METRICS_JSON" | python3 -c \
              "import sys,json; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin).get('component',{}).get('measures',[])}; print(m.get('$1','N/A'))" 2>/dev/null || echo "N/A"
          }

          COVERAGE=$(parse_metric coverage)
          DUPLICATIONS=$(parse_metric duplicated_lines_density)
          BUGS=$(parse_metric bugs)
          VULNERABILITIES=$(parse_metric vulnerabilities)
          CODE_SMELLS=$(parse_metric code_smells)
          SEC_HOTSPOTS=$(parse_metric security_hotspots)

          if   [ "$QG_STATUS" = "OK" ];    then QG_BADGE="✅ PASSED"
          elif [ "$QG_STATUS" = "ERROR" ]; then QG_BADGE="❌ FAILED"
          else                                  QG_BADGE="⚠️ $QG_STATUS"
          fi

          {
            echo "## 🔍 SonarQube — $QG_BADGE"
            echo ""
            echo "| Métrica | Valor | Umbral |"
            echo "|---------|-------|--------|"
            echo "| Quality Gate | $QG_BADGE | — |"
            echo "| Coverage | ${COVERAGE}% | ≥ 80% |"
            echo "| Duplicaciones | ${DUPLICATIONS}% | ≤ 3% |"
            echo "| Bugs | $BUGS | 0 críticos |"
            echo "| Vulnerabilidades | $VULNERABILITIES | 0 críticas |"
            echo "| Code Smells | $CODE_SMELLS | — |"
            echo "| Security Hotspots | $SEC_HOTSPOTS | 0 sin revisar |"
            echo ""
            echo "[📊 Ver análisis completo en SonarQube]($DASHBOARD_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  # ── 2. SCA: Trivy ───────────────────────────────────────────────────────────
  sca-trivy:
    name: SCA — Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — escanear y guardar tabla
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          trivy fs . \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --skip-dirs '.git,node_modules,dist' \
            --format table \
            --output trivy-table.txt 2>/dev/null || true

          CRITICAL=$(trivy fs . --severity CRITICAL --ignore-unfixed --skip-dirs '.git,node_modules,dist' --format json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results',[])))" 2>/dev/null || echo "0")
          HIGH=$(trivy fs . --severity HIGH --ignore-unfixed --skip-dirs '.git,node_modules,dist' --format json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results',[])))" 2>/dev/null || echo "0")
          MEDIUM=$(trivy fs . --severity MEDIUM --ignore-unfixed --skip-dirs '.git,node_modules,dist' --format json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results',[])))" 2>/dev/null || echo "0")

          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
            SCA_STATUS="✅ Sin vulnerabilidades CRITICAL/HIGH"
          else
            SCA_STATUS="⚠️ Vulnerabilidades encontradas (modo informativo)"
          fi

          {
            echo "## 🛡️ SCA — Trivy — $SCA_STATUS"
            echo ""
            echo "| Severidad | Vulnerabilidades encontradas |"
            echo "|-----------|----------------------------|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Medium | $MEDIUM |"
            echo ""
            echo "> Solo aplica a dependencias con fix disponible. Modo informativo — no bloquea el pipeline."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sanitize artifact name
        if: always()
        run: echo "ARTIFACT_KEY=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sca-report-${{ env.ARTIFACT_KEY }}-${{ github.run_id }}
          path: trivy-table.txt
          retention-days: 30

  # ── 3. SCA: npm audit (OWASP A06) ───────────────────────────────────────────
  # Complementa Trivy: usa el advisory database oficial de npm, más preciso
  # para CVEs del ecosistema JavaScript. CRITICAL bloquea el merge; HIGH es informativo.
  sca-npm-audit:
    name: SCA — npm audit (OWASP A06)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit — escanear dependencias
        id: npm_audit
        run: |
          npm audit --json > npm-audit.json 2>/dev/null || true

          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'critical'))
          " 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'high'))
          " 2>/dev/null || echo "0")

          MODERATE=$(python3 -c "
          import json
          d = json.load(open('npm-audit.json'))
          vulns = d.get('vulnerabilities', {})
          print(sum(1 for v in vulns.values() if v.get('severity') == 'moderate'))
          " 2>/dev/null || echo "0")

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH"         >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
            AUDIT_STATUS="✅ Sin vulnerabilidades CRITICAL/HIGH"
          elif [ "$CRITICAL" = "0" ]; then
            AUDIT_STATUS="⚠️ HIGH encontradas — revisar antes de merge"
          else
            AUDIT_STATUS="❌ CRITICAL encontradas — merge bloqueado"
          fi

          {
            echo "## 🔒 SCA — npm audit — $AUDIT_STATUS"
            echo ""
            echo "| Severidad | Vulnerabilidades |"
            echo "|-----------|-----------------|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Moderate | $MODERATE |"
            echo ""
            echo "> **Critical** bloquea el merge. **High** es informativo."
            echo "> Correr \`npm audit fix\` localmente para dependencias con fix disponible."
            echo "> Referencia: OWASP A06 — Vulnerable and Outdated Components."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sanitize artifact name
        if: always()
        run: echo "ARTIFACT_KEY=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report-${{ env.ARTIFACT_KEY }}-${{ github.run_id }}
          path: npm-audit.json
          retention-days: 30

      - name: Bloquear merge si hay vulnerabilidades CRITICAL
        if: steps.npm_audit.outputs.critical != '0'
        run: |
          echo "❌ npm audit encontró ${{ steps.npm_audit.outputs.critical }} vulnerabilidad(es) CRITICAL."
          echo "   Correr 'npm audit fix' o actualizar la dependencia afectada antes de hacer merge."
          exit 1
