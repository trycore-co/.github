name: Reusable — PR Check Python Service

on:
  workflow_call:
    inputs:
      service-dir:
        description: 'Directorio del servicio desde la raíz del repo. Usar "." para repos de un solo servicio.'
        required: true
        type: string
      sonar-project-key:
        required: true
        type: string
      sonar-project-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.11'
      sonar-sources:
        description: 'Directorios de fuentes para SonarQube (ej: src,config.py o app)'
        required: false
        type: string
        default: 'app'
      cov-dirs:
        description: 'Directorios para pytest --cov separados por coma (ej: src o app)'
        required: false
        type: string
        default: 'app'
      requirements-file:
        description: 'Archivo de dependencias a instalar (ej: requirements.txt o requirements-test.txt)'
        required: false
        type: string
        default: 'requirements.txt'
      has-tests:
        description: 'true si el servicio tiene suite de unit tests'
        required: false
        type: boolean
        default: true
      tests-continue-on-error:
        description: 'TEMPORAL: true cuando hay tests rotos siendo corregidos'
        required: false
        type: boolean
        default: false
      coverage-exclusions:
        description: 'Patrones Sonar para excluir de cobertura'
        required: false
        type: string
        default: 'app/api/**,app/main.py,app/config.py'
      runner:
        description: 'Runner label. Usar "self-hosted" para el runner on-prem de la org.'
        required: false
        type: string
        default: 'ubuntu-latest'
      test-env-vars:
        description: 'Variables de entorno para tests (formato KEY=VALUE, una por línea). Definir en el wrapper del repo, no aquí.'
        required: false
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  check:
    name: Tests & SonarQube
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitizar project key y variables de Sonar
        id: artifact
        run: |
          echo "key=$(echo '${{ inputs.sonar-project-key }}' | tr ':' '-')" >> "$GITHUB_OUTPUT"
          echo "SONAR_HOST_URL=$(echo '${{ vars.SONAR_HOST_URL }}' | tr -d '[:space:]')" >> "$GITHUB_ENV"

      - name: Setup Python
        if: ${{ inputs.has-tests }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: '${{ inputs.service-dir }}/${{ inputs.requirements-file }}'

      - name: Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install dependencies
        if: ${{ inputs.has-tests }}
        working-directory: ${{ inputs.service-dir }}
        run: pip install -r ${{ inputs.requirements-file }}

      - name: Exportar env vars de tests
        if: ${{ inputs.has-tests && inputs.test-env-vars != '' }}
        env:
          TEST_ENV_VARS: ${{ inputs.test-env-vars }}
        run: |
          echo "$TEST_ENV_VARS" | grep -v '^#' | grep -v '^[[:space:]]*$' | grep '=' >> "$GITHUB_ENV"

      - name: Run unit tests with coverage
        if: ${{ inputs.has-tests }}
        working-directory: ${{ inputs.service-dir }}
        continue-on-error: ${{ inputs.tests-continue-on-error }}
        run: |
          COV_ARGS=""
          for dir in $(echo "${{ inputs.cov-dirs }}" | tr ',' ' '); do
            COV_ARGS="$COV_ARGS --cov=$dir"
          done
          pytest tests/unit/ -v \
            $COV_ARGS \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            --tb=short

      - name: Encabezado Unit Tests en summary
        if: ${{ inputs.has-tests }}
        run: |
          echo "## 🧪 Unit Tests — ${{ inputs.sonar-project-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar resultados de tests
        uses: mikepenz/action-junit-report@v4
        if: ${{ inputs.has-tests }}
        with:
          report_paths: '${{ inputs.service-dir }}/test-results.xml'
          check_name: 'Unit Tests — ${{ inputs.sonar-project-name }}'

      - name: Preparar sonar-project.properties
        if: always()
        working-directory: ${{ inputs.service-dir }}
        run: |
          echo "sonar.projectKey=${{ inputs.sonar-project-key }}" > sonar-project.properties
          echo "sonar.projectName=${{ inputs.sonar-project-name }}" >> sonar-project.properties
          echo "sonar.sources=${{ inputs.sonar-sources }}" >> sonar-project.properties
          echo "sonar.python.version=${{ inputs.python-version }}" >> sonar-project.properties
          echo "sonar.qualitygate.wait=false" >> sonar-project.properties

          if [ "${{ inputs.has-tests }}" = "true" ]; then
            echo "sonar.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**,**/*.pyc,**/tests/**" >> sonar-project.properties
            echo "sonar.tests=tests" >> sonar-project.properties
            echo "sonar.test.inclusions=**/test_*.py" >> sonar-project.properties
            echo "sonar.python.coverage.reportPaths=coverage.xml" >> sonar-project.properties
            echo "sonar.coverage.exclusions=${{ inputs.coverage-exclusions }}" >> sonar-project.properties
          else
            echo "sonar.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**,**/*.pyc" >> sonar-project.properties
          fi

      - name: SonarQube Scan
        if: always()
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.service-dir }}

      - name: Resumen SonarQube en Actions
        if: always()
        working-directory: ${{ inputs.service-dir }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        run: |
          REPORT=".scannerwork/report-task.txt"
          if [ ! -f "$REPORT" ]; then
            echo "## 🔍 SonarQube" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ El análisis no generó reporte (posible fallo de conexión)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          DASHBOARD_URL=$(grep "^dashboardUrl=" "$REPORT" | cut -d= -f2-)
          CE_TASK_ID=$(grep "^ceTaskId=" "$REPORT" | cut -d= -f2-)

          for i in $(seq 1 12); do
            TASK_STATUS=$(curl -sf -u "$SONAR_TOKEN:" \
              "$SONAR_HOST_URL/api/ce/task?id=$CE_TASK_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['task']['status'])" 2>/dev/null || echo "PENDING")
            if [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "FAILED" ] || [ "$TASK_STATUS" = "CANCELLED" ]; then
              break
            fi
            sleep 5
          done

          HAS_TESTS="${{ inputs.has-tests }}"
          METRIC_KEYS="duplicated_lines_density,bugs,vulnerabilities,code_smells,security_hotspots"
          [ "$HAS_TESTS" = "true" ] && METRIC_KEYS="coverage,$METRIC_KEYS"

          QG_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=${{ inputs.sonar-project-key }}" 2>/dev/null || echo "{}")
          QG_STATUS=$(echo "$QG_JSON" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")

          METRICS_JSON=$(curl -sf -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/measures/component?component=${{ inputs.sonar-project-key }}&metricKeys=$METRIC_KEYS" 2>/dev/null || echo "{}")

          parse_metric() {
            echo "$METRICS_JSON" | python3 -c \
              "import sys,json; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin).get('component',{}).get('measures',[])}; print(m.get('$1','N/A'))" 2>/dev/null || echo "N/A"
          }

          COVERAGE=$(parse_metric coverage)
          DUPLICATIONS=$(parse_metric duplicated_lines_density)
          BUGS=$(parse_metric bugs)
          VULNERABILITIES=$(parse_metric vulnerabilities)
          CODE_SMELLS=$(parse_metric code_smells)
          SEC_HOTSPOTS=$(parse_metric security_hotspots)

          if   [ "$QG_STATUS" = "OK" ];    then QG_BADGE="✅ PASSED"
          elif [ "$QG_STATUS" = "ERROR" ]; then QG_BADGE="❌ FAILED"
          else                                  QG_BADGE="⚠️ $QG_STATUS"
          fi

          {
            echo "## 🔍 SonarQube — $QG_BADGE"
            echo ""
            echo "| Métrica | Valor | Umbral |"
            echo "|---------|-------|--------|"
            echo "| Quality Gate | $QG_BADGE | — |"
            [ "$HAS_TESTS" = "true" ] && echo "| Coverage | ${COVERAGE}% | ≥ 80% |"
            echo "| Duplicaciones | ${DUPLICATIONS}% | ≤ 3% |"
            echo "| Bugs | $BUGS | 0 críticos |"
            echo "| Vulnerabilidades | $VULNERABILITIES | 0 críticas |"
            echo "| Code Smells | $CODE_SMELLS | — |"
            echo "| Security Hotspots | $SEC_HOTSPOTS | 0 sin revisar |"
            echo ""
            [ "$HAS_TESTS" = "false" ] && echo "> ℹ️ Sin cobertura — este servicio no tiene suite de unit tests aún."
            echo ""
            echo "[📊 Ver análisis completo en SonarQube]($DASHBOARD_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        # Sin suite de tests no hay datos de cobertura → el QG por defecto
        # falla en 0% coverage aunque el código no tenga bugs. En ese caso
        # el resultado es informacional: el QG se muestra en el Summary pero
        # no bloquea el PR. Agregar tests y cambiar has-tests: true para que
        # el QG sea un gate real.
        continue-on-error: ${{ !inputs.has-tests }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: ${{ inputs.service-dir }}/.scannerwork/report-task.txt

      - name: Trivy — instalar e inventariar vulnerabilidades (JSON único)
        if: always()
        working-directory: ${{ inputs.service-dir }}
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # Un scan JSON captura vulnerabilidades (--ignore-unfixed) Y secretos en el mismo paso
          trivy fs . \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --skip-dirs '.git,__pycache__,venv,.venv' \
            --format json \
            --output trivy-report.json 2>/dev/null || true
          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='CRITICAL'))
          " 2>/dev/null || echo "0")
          HIGH=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='HIGH'))
          " 2>/dev/null || echo "0")
          MEDIUM=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          vulns = [v for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or [])]
          print(sum(1 for v in vulns if v.get('Severity')=='MEDIUM'))
          " 2>/dev/null || echo "0")
          # Contar secretos expuestos (se detectan independiente de --ignore-unfixed)
          SECRETS_CRITICAL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          secs = [s for r in d.get('Results',[]) for s in (r.get('Secrets') or [])]
          print(sum(1 for s in secs if s.get('Severity')=='CRITICAL'))
          " 2>/dev/null || echo "0")
          SECRETS_HIGH=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          secs = [s for r in d.get('Results',[]) for s in (r.get('Secrets') or [])]
          print(sum(1 for s in secs if s.get('Severity')=='HIGH'))
          " 2>/dev/null || echo "0")
          # Emitir annotations de GitHub para secretos (visibles sin Code Security)
          python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          for r in d.get('Results', []):
            target = r.get('Target','')
            for s in (r.get('Secrets') or []):
              sev = s.get('Severity','')
              if sev in ('CRITICAL','HIGH'):
                line = s.get('StartLine', 1)
                rule = s.get('RuleID','secret')
                title = s.get('Title','Secreto detectado')
                print(f'::error file={target},line={line}::[Trivy Secrets] {title} ({rule}) — rotar credencial y reemplazar con placeholder')
          " 2>/dev/null || true
          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
            SCA_STATUS="✅ Sin vulnerabilidades CRITICAL/HIGH"
          else
            SCA_STATUS="⚠️ Vulnerabilidades encontradas (modo informativo)"
          fi
          if [ "$SECRETS_CRITICAL" = "0" ] && [ "$SECRETS_HIGH" = "0" ]; then
            SECRETS_STATUS="✅ Sin secretos expuestos"
          else
            SECRETS_STATUS="🚨 Secretos expuestos — rotar credenciales"
          fi
          {
            echo "## 🛡️ SCA — Trivy — $SCA_STATUS"
            echo ""
            echo "| Severidad | Vulnerabilidades (con fix) |"
            echo "|-----------|---------------------------|"
            echo "| 🔴 Critical | $CRITICAL |"
            echo "| 🟠 High | $HIGH |"
            echo "| 🟡 Medium | $MEDIUM |"
            echo ""
            echo "> Solo aplica a dependencias con fix disponible. Modo informativo — no bloquea el pipeline."
            echo ""
            echo "## 🔐 Secretos — Trivy — $SECRETS_STATUS"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$CRITICAL" != "0" ] || [ "$HIGH" != "0" ] || [ "$MEDIUM" != "0" ]; then
            DETAIL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          rows = []
          for r in d.get('Results', []):
            for v in (r.get('Vulnerabilities') or []):
              sev = v.get('Severity','')
              if sev in ('CRITICAL','HIGH','MEDIUM'):
                fix = v.get('FixedVersion','') or 'Sin fix'
                rows.append(f\"| {v.get('PkgName','?')} | {sev} | {v.get('VulnerabilityID','?')} | {v.get('InstalledVersion','?')} | {fix} |\")
          print('\n'.join(rows[:60]))
          " 2>/dev/null || echo "")
            if [ -n "$DETAIL" ]; then
              {
                echo "<details>"
                echo "<summary>📋 Ver detalle de CVEs encontrados (CRITICAL / HIGH / MEDIUM)</summary>"
                echo ""
                echo "| Paquete | Severidad | CVE | Versión instalada | Fix disponible |"
                echo "|---------|-----------|-----|-------------------|----------------|"
                echo "$DETAIL"
                echo "</details>"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          # Detalle de secretos en el summary (sin exponer el valor real)
          SECRET_DETAIL=$(python3 -c "
          import json
          d = json.load(open('trivy-report.json'))
          rows = []
          for r in d.get('Results', []):
            target = r.get('Target','')
            for s in (r.get('Secrets') or []):
              sev = s.get('Severity','')
              if sev in ('CRITICAL','HIGH','MEDIUM'):
                rows.append(f\"| \`{target}\` | {sev} | {s.get('RuleID','?')} | {s.get('Title','?')} | L{s.get('StartLine','?')} |\")
          print('\n'.join(rows[:30]))
          " 2>/dev/null || echo "")
          if [ -n "$SECRET_DETAIL" ]; then
            {
              echo "| Archivo | Severidad | Regla | Descripción | Línea |"
              echo "|---------|-----------|-------|-------------|-------|"
              echo "$SECRET_DETAIL"
              echo ""
              echo "> ⚠️ **Acción requerida:** rotar las credenciales expuestas y reemplazar con placeholders en el archivo."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> Sin secretos detectados en el escaneo." >> "$GITHUB_STEP_SUMMARY"
          fi
          # Generar SARIF (incluye vuln + secrets para Code Security si está habilitado)
          trivy fs . \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --skip-dirs '.git,__pycache__,venv,.venv' \
            --format sarif \
            --output trivy-results.sarif 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sca-report-${{ steps.artifact.outputs.key }}-${{ github.run_id }}
          path: ${{ inputs.service-dir }}/trivy-report.json
          retention-days: 30

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
