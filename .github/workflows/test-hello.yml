name: Test — Reusable Hello v2

on:
  workflow_call:
    inputs:
      has-tests:
        required: false
        type: boolean
        default: true
      service-dir:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  test:
    name: Hello v2
    runs-on: ubuntu-latest
    steps:
      - run: echo "service=${{ inputs.service-dir }} has-tests=${{ inputs.has-tests }}"
      - run: echo "token available = ${{ secrets.SONAR_TOKEN != '' }}"
